name: Wheels

# Build per-platform wheels for the two distributable packages in this repo
# (issue #404):
#
#   - ``bucket-brigade`` — pure-Python wheel built by hatchling (one wheel
#     covers all platforms; same artifact PR #397 already shipped).
#
#   - ``bucket-brigade-core`` — compiled Rust + PyO3 extension. ``cibuildwheel``
#     drives ``maturin`` to produce one wheel per (platform, Python ABI)
#     combination so that ``pip install bucket-brigade-core`` works without
#     a Rust toolchain on the user's machine.
#
# When ``bucket-brigade-core`` is a hard runtime dep of ``bucket-brigade``
# (see ``pyproject.toml``), a successful build of *both* packages closes the
# acceptance criterion in issue #404: ``pip install bucket-brigade`` (on a
# supported platform) yields a working
# ``bucket_brigade.make('minimal_specialization-v1').reset()`` with the Rust
# speedup ext loaded, no separate ``cd bucket-brigade-core && pip install .``
# step.
#
# Triggers:
#   - pull_request (build-only): verifies the matrix on every PR. No upload.
#   - push to tag ``v*`` (build + publish): also publishes to PyPI via
#     OIDC trusted publishing. The publish job gates on the build job;
#     no API tokens are stored in the repo. Trusted publisher setup is a
#     one-time human step on PyPI (see ``docs/RELEASE.md``).
#   - workflow_dispatch: manual trigger for testing matrix changes.

on:
  pull_request:
    paths:
      - "bucket-brigade-core/**"
      - "pyproject.toml"
      - ".github/workflows/wheels.yml"
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Cancel stale in-flight runs on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # bucket-brigade-core — compiled Rust + PyO3 wheels via cibuildwheel.
  # ---------------------------------------------------------------------
  build_core_wheels:
    name: Build core wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — manylinux container, runs natively on x86_64 runners.
          - os: ubuntu-latest
            cibw_archs: x86_64
          # Linux aarch64 — built under QEMU on x86_64 runners. Slow but
          # avoids needing a separate ARM runner. Drop if it bloats CI time
          # too much; not a release blocker per issue #404.
          - os: ubuntu-latest
            cibw_archs: aarch64
          # macOS arm64 — Apple Silicon. ``macos-14`` is GitHub's M1 runner.
          - os: macos-14
            cibw_archs: arm64
          # macOS x86_64 — Intel. ``macos-13`` is the last Intel runner image.
          # Optional per issue #404; keeping it for symmetry while it exists.
          - os: macos-13
            cibw_archs: x86_64
    steps:
      - uses: actions/checkout@v4

      # Required for the Linux aarch64 emulation path. No-op on other archs
      # (the action exits cleanly when not on Linux).
      - name: Set up QEMU (Linux only)
        if: runner.os == 'Linux' && matrix.cibw_archs == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.21
        with:
          package-dir: bucket-brigade-core
          output-dir: wheelhouse
        env:
          # Build CPython 3.11/3.12/3.13 only. The CIBW_BUILD include-list
          # implicitly excludes everything else (PyPy, older CPython, etc.);
          # CIBW_SKIP only kills variants we can't otherwise scope out —
          # musllinux (no Rust toolchain pre-installed in that container,
          # not worth the complexity) and Windows (unsupported per
          # CLAUDE.md compute guide).
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *-win*"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          # Pass through the env vars our build.sh sets defensively. These
          # are read by cibuildwheel inside the build container.
          CIBW_ENVIRONMENT: 'PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 RUSTC_WRAPPER='
          # manylinux container: install a Rust toolchain inside the
          # container before maturin builds. ``before-all`` runs once per
          # platform/arch.
          CIBW_BEFORE_ALL_LINUX: 'curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable'
          CIBW_ENVIRONMENT_LINUX: 'PATH="/root/.cargo/bin:$PATH" PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 RUSTC_WRAPPER='
          # Sanity test the produced wheel after install. ``--no-build-isolation``
          # not needed here — cibuildwheel installs the prebuilt wheel.
          CIBW_TEST_COMMAND: 'python -c "from bucket_brigade_core import BucketBrigade, Scenario; print(BucketBrigade, Scenario)"'

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-core-${{ matrix.os }}-${{ matrix.cibw_archs }}
          path: wheelhouse/*.whl

  # ---------------------------------------------------------------------
  # bucket-brigade-core — sdist (so pip can fall back to source build on
  # unsupported platforms).
  # ---------------------------------------------------------------------
  build_core_sdist:
    name: Build core sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install maturin
        run: python -m pip install "maturin>=1.5,<2.0"
      - name: Build sdist
        working-directory: bucket-brigade-core
        run: maturin sdist --out ../wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: sdist-core
          path: wheelhouse/*.tar.gz

  # ---------------------------------------------------------------------
  # bucket-brigade — pure-Python wheel + sdist via hatchling.
  # ---------------------------------------------------------------------
  build_python_dist:
    name: Build pure-Python wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install build
      - name: Build sdist + wheel
        run: python -m build --sdist --wheel --outdir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: dist-python
          path: |
            wheelhouse/*.whl
            wheelhouse/*.tar.gz

  # ---------------------------------------------------------------------
  # Publish to PyPI on tag push (e.g. ``git tag v0.1.0 && git push --tags``).
  #
  # Uses PyPI's OIDC trusted publishing — no API tokens stored in the repo.
  # Setup is a one-time human task on PyPI:
  #   1. Create the project on PyPI (or claim an existing name).
  #   2. Add a trusted publisher pointing at this repo + workflow file +
  #      job name (``publish``) + environment (``pypi``).
  #
  # The job is gated on ``startsWith(github.ref, 'refs/tags/v')`` so a
  # plain PR / branch push can never publish.
  # ---------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [build_core_wheels, build_core_sdist, build_python_dist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/bucket-brigade
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-aggregate
      - name: Flatten artifacts into single dist/ dir
        run: |
          mkdir -p dist
          find dist-aggregate -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} dist/ \;
          ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Defaults to publishing the ``dist/`` directory. No password / token
        # config — OIDC handles auth via the ``id-token: write`` permission.
