name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Create virtual environment
      run: uv venv
    # bucket-brigade-core (Rust ext) is now a hard dep of bucket-brigade
    # (issue #404). Install it first so the subsequent install of
    # bucket-brigade sees the requirement as already-satisfied — otherwise
    # uv would try to resolve it against PyPI and fail (the package is
    # not yet published).
    - name: Install maturin
      run: uv pip install "maturin>=1.5,<2.0"
    - name: Build Rust Python bindings
      run: |
        cd bucket-brigade-core
        PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 ../.venv/bin/maturin develop --release --features python
      env:
        VIRTUAL_ENV: ${{ github.workspace }}/.venv
    - name: Install Python dependencies
      run: uv pip install -e .[dev]
    - name: Install test annotation plugin
      run: uv pip install pytest-github-actions-annotate-failures
    - name: Run fast tests
      run: |
        # pipefail: without it the step's exit status is tee's (always 0),
        # so pytest failures were silently swallowed (issue #484).
        set -o pipefail
        # cov-fail-under: this dev-only job has no torch, so all of
        # bucket_brigade/training/* (and other RL-gated modules) measure 0%.
        # Real coverage in this environment is 48% — the old 75 was never
        # actually enforced (the job was false-green, issue #484). Set the
        # gate just below the measured baseline so it catches regressions
        # without blocking on the torch-gated modules.
        uv run pytest \
          --cov=bucket_brigade \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=45 \
          -v \
          --tb=short \
          -m "not slow and not integration" \
          | tee pytest-output.txt

        # Generate GitHub summary
        echo "## 🧪 Test Results (Fast Tests)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Running**: Fast tests only (slow and integration tests skipped)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        tail -50 pytest-output.txt >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: python

  test-web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml
    - name: Install dependencies
      run: cd web && pnpm install --frozen-lockfile
    - name: Run linting
      run: cd web && pnpm run lint:biome
    - name: Run type checking
      run: cd web && pnpm run typecheck || echo "TypeScript errors found - continuing for CI"
    - name: Run unit tests
      run: cd web && pnpm run test
    # Skip Playwright e2e tests for now - they need UI fixes
    # - name: Install Playwright
    #   run: cd web && pnpm exec playwright install --with-deps
    # - name: Run e2e tests
    #   run: cd web && timeout 60 pnpm run test:e2e || echo "Web tests timed out - continuing..."

  lint-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Create virtual environment
      run: uv venv
    # See note in test-python job — Rust ext must be installed before
    # bucket-brigade now that #404 made it a hard runtime dep.
    - name: Install maturin
      run: uv pip install "maturin>=1.5,<2.0"
    - name: Build Rust Python bindings
      run: |
        cd bucket-brigade-core
        PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 ../.venv/bin/maturin develop --release --features python
      env:
        VIRTUAL_ENV: ${{ github.workspace }}/.venv
    - name: Install Python dependencies
      run: uv pip install -e .[dev]
    - name: Run Ruff
      run: uv run ruff check . --exclude .venv/ --exclude scripts/ --exclude node_modules/ --exclude web/node_modules/ --exclude .anvil/
    - name: Run Ruff Format Check
      run: uv run ruff format --check . --exclude .venv/ --exclude scripts/ --exclude node_modules/ --exclude web/node_modules/ --exclude .anvil/
    - name: Run MyPy
      run: uv run mypy . --ignore-missing-imports || true

  build-web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Set up pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        target: wasm32-unknown-unknown
    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
    - name: Build WASM package
      run: cd bucket-brigade-core && wasm-pack build --target web
    - name: Create virtual environment
      run: uv venv
    - name: Install dependencies
      run: cd web && pnpm install --frozen-lockfile
    - name: Build
      run: cd web && pnpm run build

  integration-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Set up pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml
    - name: Create virtual environment
      run: uv venv
    # See note in test-python job — Rust ext must be installed before
    # bucket-brigade now that #404 made it a hard runtime dep.
    - name: Install maturin
      run: uv pip install "maturin>=1.5,<2.0"
    - name: Build Rust Python bindings
      run: |
        cd bucket-brigade-core
        PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 ../.venv/bin/maturin develop --release --features python
      env:
        VIRTUAL_ENV: ${{ github.workspace }}/.venv
    - name: Install Python dependencies
      # [dev] is required: this job runs pytest, which is a dev extra. It was
      # missing before, so `uv run pytest` failed to spawn (exit 2) and the
      # tee pipe swallowed it — this job was false-green too (issue #484).
      run: uv pip install -e .[dev]
    - name: Install web dependencies
      run: cd web && pnpm install --frozen-lockfile
    - name: Run integration tests
      run: |
        # pipefail: without it the step's exit status is tee's (always 0),
        # so pytest failures were silently swallowed (issue #484).
        set -o pipefail

        # Run pytest integration tests
        uv run pytest \
          -v \
          --tb=short \
          --run-integration \
          tests/test_integration.py \
          | tee integration-output.txt

        # Also run legacy integration checks
        uv run python scripts/run_one_game.py

        # Generate summary
        echo "## 🔗 Integration Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        tail -30 integration-output.txt >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Create virtual environment
      run: uv venv
    # See note in test-python job — Rust ext must be installed before
    # bucket-brigade now that #404 made it a hard runtime dep.
    - name: Install maturin
      run: uv pip install "maturin>=1.5,<2.0"
    - name: Build Rust Python bindings
      run: |
        cd bucket-brigade-core
        PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 ../.venv/bin/maturin develop --release --features python
      env:
        VIRTUAL_ENV: ${{ github.workspace }}/.venv
    - name: Install Python dependencies
      run: uv pip install -e .[dev]
    - name: Run pre-commit
      run: uv run pre-commit run --all-files
